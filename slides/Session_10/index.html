# Session 10: Tokenomics & NFTs

---

## 1. What is Tokenomics?

---

### Definition
The study of the economic models, incentives, and distribution mechanisms of a cryptographic token.

- Supply Dynamics (Inflation vs. Deflation)
<!-- .element: class="fragment" -->
- Utility (What does the token do?)
<!-- .element: class="fragment" -->
- Distribution (Vesting schedules, Airdrops)
<!-- .element: class="fragment" -->

----

### Token Standards: ETH vs SOL

| Chain | Fungible | Non-Fungible |
| :--: | :--: | :--: |
| Ethereum | ERC-20 | ERC-721 |
| Solana | SPL Token | SPL + Metaplex |

---

## 2. NFTs in Practice

---

### Value Drivers
- Provenance (Cryptographic proof of origin)
- Digital Scarcity
- Programmable Royalties (e.g. 5% back to creator on every trade)

----

### Solana Metaplex
- The Metadata struct attaches a name, symbol, and off-chain URI to a mathematically standard SPL Token.
- Massively reduces the cost of minting compared to deploying fresh ERC-721 contracts.
