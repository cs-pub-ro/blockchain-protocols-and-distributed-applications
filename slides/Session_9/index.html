# Session 9: Virtual Machines

---

## 1. Execution Environments

---

### What is a Blockchain VM?
- Sandboxed execution environment for smart contracts
<!-- .element: class="fragment" -->
- Deterministic behavior across all nodes
<!-- .element: class="fragment" -->
- Gas/Compute metering to prevent infinite loops
<!-- .element: class="fragment" -->

----

### EVM vs. WebAssembly (WASM) vs. eBPF/Sealevel

| VM Type | Primary Chain | Source Languages | Speed |
| :--: | :--: | :--: | :--: |
| EVM | Ethereum | Solidity, Vyper | Moderate |
| WASM | MultiversX, Polkadot | Rust, C++, Go | High |
| eBPF | Solana (Sealevel) | Rust, C, C++ | Very High, Parallel |

---

## 2. Solana's Sealevel Architecture

---

### Parallel Execution

- Unlike EVM (single-threaded), Solana executes transactions concurrently.
- Transactions specify **read** and **write** accounts upfront.
- Non-overlapping account state = simultaneous execution.

----

### BPF (Berkeley Packet Filter)
- Solana originally adapted BPF (used in Linux networking) to run smart contracts.
- Highly optimized, low-overhead execution.
