# Session 12: MEV (Maximal Extractable Value)

---

## 1. What is MEV?

---

### Definition
Profit validators or searchers extract from users by reordering, inserting, or censoring transactions within a block.

- **The Mempool:** The "waiting room" where pending transactions sit before block inclusion.
- Because the mempool is public, anyone can see your trade before it executes.

----

### Common MEV Strategies

1. **Front-running:** Seeing a large buy order and buying before it to sell right after at a guaranteed profit.
2. **Back-running:** Executing immediately after a large trade (e.g., liquidations or arbitrage).
3. **Sandwich Attacks:** Combining front-running and back-running to fully exploit a user's slippage tolerance.

---

## 2. MEV Across Different Chains

---

### Ethereum vs Solana MEV
- **Ethereum:** Global mempool. Highly competitive, structured block builders (Flashbots).
- **Solana:** No global mempool. Transactions are forwarded directly to the current leader. Jito introduced out-of-protocol MEV auctions to Solana to prevent network spam.
