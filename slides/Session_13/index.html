# Session 13: Privacy on Public Blockchains

---

## 1. Pseudonymity vs Anonymity

---

### The Transparency Problem
Public blockchains (Bitcoin, Ethereum, Solana) are radically transparent. Every transaction, balance, and interaction is visible to the entire world.
- Wallets are **pseudonymous** (0xABC...), not anonymous. 
- Once linked to an identity (via KYC exchanges), entire financial histories are compromised.

----

### Privacy Implications
- Institutions cannot execute large payrolls or trades publicly without giving up their market edge.
- User data protection is difficult.

---

## 2. Privacy Solutions

---

### Mixers & Tumblers
- E.g., Tornado Cash. Pools funds to break the deterministic link between sender and receiver.
- Heavily scrutinized by regulators.

----

### Zero-Knowledge Proofs (ZKPs)
- Mathematical methods to prove a statement is true without revealing the underlying data.
- **ZK-Rollups:** Scale transactions by bundling them and posting a cryptographic proof.
- **Privacy Coins:** Zcash, Monero (using ring signatures and stealth addresses).
