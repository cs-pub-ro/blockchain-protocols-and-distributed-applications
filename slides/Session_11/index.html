# Session 11: DeFi

---

## 1. The Core of Decentralized Finance

---

### TradFi vs DeFi
- **TradFi:** Relies on trust in institutions (banks, brokers, clearinghouses). Slow settlement.
- **DeFi:** Relies on trust in math and code. Instant settlement. Non-custodial.

----

### Key DeFi Primitives

1. **Decentralized Exchanges (DEXs)**
2. **Lending Protocols**
3. **Yield Aggregators**
4. **Stablecoins**

---

## 2. Market Structures

---

### Automated Market Makers (AMMs)
- Liquidity Pools (e.g., SOL/USDC)
- Constant Product Formula: $x * y = k$
- Slippage & Impermanent Loss

----

### Central Limit Order Books (CLOBs)
- Matching buyers and sellers at specific price points.
- Extremely difficult on Ethereum due to gas costs.
- Possible on Solana (e.g., OpenBook) due to sub-second finality.

---
